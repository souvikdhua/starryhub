<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starrygate</title>
    <meta name="description" content="Starrygate — astrology that doesn't lie to you.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #000000;
            --bg-elevated: #0a0a0a;
            --text: #f0f0f0;
            --text-secondary: #888888;
            --text-muted: #444444;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --sans: 'Inter', -apple-system, sans-serif;
            --serif: 'Cormorant Garamond', Georgia, serif;
        }

        html {
            scroll-behavior: smooth;
        }

        ::selection {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            text-transform: lowercase;
            overflow-x: hidden;
        }

        /* ─── Constellation Canvas ─── */
        #constellationCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }

        /* ─── Ambient Floating Orbs ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: orbFloat 20s infinite ease-in-out, orbFadeIn 3s forwards;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            top: 50%;
            right: -15%;
            animation-delay: 7s;
            animation-duration: 25s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.025) 0%, transparent 70%);
            bottom: -5%;
            left: 30%;
            animation-delay: 14s;
            animation-duration: 30s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -40px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(15px, 30px) scale(1.02);
            }
        }

        @keyframes orbFadeIn {
            to {
                opacity: 1;
            }
        }

        /* ─── Grain Overlay ─── */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ─── Vignette Overlay ─── */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 40px;
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            font-family: var(--sans);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 8px;
            color: var(--text);
            text-transform: uppercase;
        }

        .start-over-btn {
            position: absolute;
            right: 40px;
            font-family: var(--sans);
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--text-secondary);
            text-transform: lowercase;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            background: none;
            border: none;
        }

        .start-over-btn:hover {
            color: #ffffff;
        }

        /* ─── Main Container ─── */
        .main-container {
            flex: 1;
            padding: 140px 24px 80px;
            max-width: 620px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* ─── Welcome Section ─── */
        .welcome-section {
            padding: 60px 0 40px;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        .welcome-poem {
            font-family: var(--serif);
            font-size: 2.8rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: none;
            opacity: 0;
            animation: textReveal 1.5s ease forwards 0.3s;
        }

        .welcome-poem-sub {
            font-family: var(--serif);
            font-size: 1.6rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 80px;
            text-transform: none;
            opacity: 0;
            animation: textReveal 1.5s ease forwards 0.8s;
        }

        @keyframes textReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* ─── Birth Form ─── */
        .birth-form {
            text-align: left;
            margin-top: 20px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            animation: textReveal 1s ease forwards 1.2s;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: center;
        }

        .form-group:focus-within::after {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: scaleX(1.05);
        }

        .form-group label {
            display: block;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }

        .form-group:focus-within label {
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.15rem;
            font-family: var(--serif);
            font-weight: 300;
            outline: none;
            padding: 8px 0 12px;
            letter-spacing: 0.5px;
            transition: color 0.4s ease;
            caret-color: rgba(255, 255, 255, 0.8);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .form-group input[type="date"],
        .form-group input[type="time"] {
            color-scheme: dark;
        }

        .chart-btn {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: var(--sans);
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
        }

        .chart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .chart-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
            letter-spacing: 6px;
        }

        .chart-btn:hover::before {
            left: 100%;
        }

        .chart-btn:active {
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }

        .chart-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            letter-spacing: 4px;
            transform: none;
        }

        /* ─── City Dropdown ─── */
        .city-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 50;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        .city-dropdown.hidden {
            display: none;
        }

        .city-dropdown::-webkit-scrollbar {
            width: 4px;
        }

        .city-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .city-option {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--sans);
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .city-option:last-child {
            border-bottom: none;
        }

        .city-option:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .form-error {
            color: #666;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
            font-family: var(--sans);
            letter-spacing: 1px;
        }

        /* ─── Reading Area ─── */
        .reading-area {
            display: none;
            flex-direction: column;
            gap: 0;
            padding-top: 20px;
        }

        .reading-header {
            font-family: var(--serif);
            font-size: 3rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            text-align: center;
            margin-bottom: 40px;
            text-transform: none;
            padding-bottom: 60px;
            position: relative;
            opacity: 0;
            animation: textReveal 1.5s ease forwards 0.2s;
        }

        .reading-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: var(--text-muted);
        }

        /* ─── Planetary Badges ─── */
        .planetary-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.8s;
            flex-wrap: wrap;
        }

        .planetary-badges.hidden {
            display: none;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--sans);
        }

        .badge-icon {
            font-size: 1.2rem;
            color: var(--text);
        }

        .badge-text {
            font-size: 0.8rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .reading-content {
            font-size: 1.15rem;
            line-height: 2.2;
            color: var(--text);
            font-family: var(--sans);
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .reading-visual-divider {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 60px;
            letter-spacing: 12px;
        }

        .reading-section {
            margin-bottom: 0;
            padding: 50px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reading-section.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .reading-content p {
            margin-bottom: 20px;
            font-weight: 300;
        }

        .reading-content strong {
            display: block;
            font-family: var(--sans);
            font-weight: 200;
            font-size: 1.8rem;
            letter-spacing: 6px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            color: var(--text);
            text-transform: lowercase;
            position: relative;
        }

        .reading-content strong::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 24px;
            height: 1px;
            background: var(--text-muted);
            transition: width 0.6s ease;
        }

        .reading-section.visible strong::after {
            width: 60px;
        }

        .reading-content ul {
            list-style: none;
            margin-bottom: 30px;
        }

        .reading-content li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 24px;
            color: #d0d0d0;
            font-weight: 300;
            line-height: 2;
            font-size: 1.12rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.5s ease;
        }

        .reading-section.visible li {
            opacity: 1;
            transform: translateX(0);
        }

        .reading-section.visible li:nth-child(1) {
            transition-delay: 0.1s;
        }

        .reading-section.visible li:nth-child(2) {
            transition-delay: 0.2s;
        }

        .reading-section.visible li:nth-child(3) {
            transition-delay: 0.3s;
        }

        .reading-section.visible li:nth-child(4) {
            transition-delay: 0.4s;
        }

        .reading-section.visible li:nth-child(5) {
            transition-delay: 0.5s;
        }

        .reading-content li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 10px;
            height: 1px;
            background: #555;
        }

        /* ─── Do/Don't Glass Panels ─── */
        .dos-donts {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            margin-bottom: 24px;
            font-size: 1rem;
        }

        .do-block,
        .dont-block {
            flex: 1;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .do-block:hover,
        .dont-block:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .do-label {
            color: var(--text);
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 3.5px;
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .dont-label {
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 3.5px;
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .do-text {
            color: #b0b0b0;
            line-height: 1.8;
            font-weight: 300;
            font-size: 1.05rem;
        }

        /* ─── Chat Follow-up ─── */
        .chat-area {
            display: none;
            margin-top: 80px;
            padding-top: 60px;
            position: relative;
        }

        .chat-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: var(--text-muted);
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin-bottom: 60px;
        }

        .msg-user {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            font-family: var(--serif);
            margin-bottom: 8px;
            text-align: right;
            opacity: 0;
            animation: msgSlideIn 0.5s ease forwards;
        }

        @keyframes msgSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-assistant {
            color: var(--text);
            font-size: 1rem;
            line-height: 2;
            font-weight: 300;
            opacity: 0;
            animation: msgSlideIn 0.8s ease forwards 0.15s;
        }

        .msg-assistant p {
            margin-bottom: 12px;
        }

        /* ─── Input Area (Floating Glass) ─── */
        .input-wrap {
            position: relative;
            margin-top: 40px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s ease;
        }

        .input-wrap:focus-within {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.02);
        }

        .input-wrap textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            font-family: var(--sans);
            font-weight: 300;
            resize: none;
            outline: none;
            display: block;
            letter-spacing: 0.3px;
        }

        .input-wrap textarea::placeholder {
            color: #333;
            letter-spacing: 1px;
        }

        /* ─── Loading Overlay — Morphing Text ─── */
        .loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .loading-text {
            font-family: var(--serif);
            font-size: 1.6rem;
            font-style: italic;
            font-weight: 300;
            color: var(--text-secondary);
            animation: pulse 2.5s infinite ease-in-out;
            text-transform: none;
            letter-spacing: 1px;
            transition: opacity 0.4s ease;
        }

        .loading-progress {
            width: 40px;
            height: 1px;
            background: var(--text-muted);
            margin-top: 40px;
            position: relative;
            overflow: hidden;
        }

        .loading-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text-secondary);
            animation: progressSlide 2s infinite ease-in-out;
        }

        @keyframes progressSlide {
            0% {
                left: -100%;
            }

            50% {
                left: 100%;
            }

            100% {
                left: 100%;
            }
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.15;
            }

            50% {
                opacity: 0.8;
            }
        }

        /* Staggered animation classes */
        .stagger-1 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 0.2s;
        }

        .stagger-2 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 0.6s;
        }

        .stagger-3 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 1.0s;
        }

        .stagger-4 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 1.4s;
        }

        .stagger-5 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 1.8s;
        }

        .stagger-6 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 2.2s;
        }

        /* ─── API Key Modal (Mono Popup) ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .modal {
            width: 100%;
            max-width: 380px;
            padding: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            animation: modalIn 0.5s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h3 {
            font-family: var(--sans);
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 6px;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .modal input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 14px 0;
            font-family: var(--sans);

        .modal button {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.15);

            font-family: var(--sans);

        /* ─── Cinematic Transition ─── */
        .cinematic-fade {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 40;
            opacity: 1;
            animation: cinematicOut 1.2s ease forwards;

        @keyframes cinematicOut {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 2px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {

        }

        /* ─── Void Cards (Song / Movie / Quote) ─── */
        .void-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 60px;
            opacity: 0;
            animation: textReveal 1.2s ease forwards 0.5s;

        .void-card {
            padding: 28px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .void-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }

        .void-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);

        .void-card-label {
            font-family: var(--sans);
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 4.5px;

            margin-bottom: 14px;

        .void-card-content {
            font-family: var(--serif);
            font-size: 1.18rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            line-height: 1.7;
            text-transform: none;
        }

        /* ─── Floating Ask Bar ─── */
        .floating-ask-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 0 24px 24px;

        }

        .floating-ask-bar.active {
            display: block;
        }

        .floating-ask-inner {
            max-width: 620px;
            margin: 0 auto;
            pointer-events: all;
        }

        .floating-chat-messages {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 16px;
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: none;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .floating-chat-messages:empty {
            display: none;
        }

        .floating-chat-messages::-webkit-scrollbar {
            width: 2px;
        }

        .floating-chat-messages::-webkit-scrollbar-thumb {

        .floating-input-container {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: #f5f5f5;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 -2px 30px rgba(0, 0, 0, 0.3);
        }

        .floating-input-container:focus-within {
            background: #ffffff;
            box-shadow: 0 -4px 50px rgba(0, 0, 0, 0.4);
        }

        .floating-ask-label {
            font-family: var(--sans);
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #999;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .floating-input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #111;
            font-size: 0.95rem;
            font-family: var(--sans);
            font-weight: 400;
            resize: none;
            outline: none;

            max-height: 80px;

        .floating-input-container textarea::placeholder {

        .floating-send-btn {

        /* ─── Bottom spacer for floating bar ─── */

        /* ─── Mobile ─── */
        @media (max-width: 600px) {
            .main-container {
                padding: 120px 20px 60px;

            .welcome-poem {
                font-size: 2rem;
            }

            .welcome-poem-sub {
                font-size: 1.2rem;
            }

            }

                font-size: 1.4rem;
                letter-spacing: 4px;
            }

            .birth-form {
                padding: 28px 20px;
            }

            .dos-donts {
                flex-direction: column;
                gap: 12px;
            }

            .void-cards {
                grid-template-columns: 1fr;

            }

            }

            .floating-ask-label {

            }
        }
    </style>
</head>

<body>

    <!-- Constellation Canvas -->
    <canvas id="constellationCanvas"></canvas>

        <div class="reading-area" id="readingArea">

                this is yours.

                <div class="badge-item"><span class="badge-icon">↑</span><span class="badge-text" id="badgeAsc"></span>
                </div>
                <div class="badge-item"><span class="badge-icon">☉</span><span class="badge-text" id="badgeSun"></span>
                </div>
                <div class="badge-item"><span class="badge-icon">☽</span><span class="badge-text" id="badgeMoon"></span>
                </div>

            <!-- Void Cards: Song / Movie / Quote -->
            <div class="void-cards hidden" id="voidCards">
                <div class="void-card" id="voidSong">
                    <span class="void-card-label">your song</span>

                </div>
                <div class="void-card" id="voidMovie">

                </div>

    </div>

    <!-- Floating Ask the Universe Bar -->
    <div class="floating-ask-bar" id="floatingAskBar">
        <div class="floating-ask-inner">
            <div class="floating-chat-messages" id="floatingChatMessages"></div>

                <span class="floating-ask-label">ask</span>

                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleFloatingSend()}"></textarea>
                <button class="floating-send-btn" onclick="handleFloatingSend()">→</button>
            </div>

    <div class="loading hidden" id="loadingOverlay">
        <div class="loading-text" id="loadingText">dissolving...</div>
        <div class="loading-progress"></div>
    </div>



    <script>
        // ─── Constellation Canvas ──────────────────────────────────────
        const canvas = document.getElementById('constellationCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let animFrame;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            const count = Math.floor((canvas.width * canvas.height) / 12000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.2 + 0.2,
                    vx: (Math.random() - 0.5) * 0.15,
                    vy: (Math.random() - 0.5) * 0.15,
                    alpha: Math.random() * 0.6 + 0.1,
                    pulse: Math.random() * Math.PI * 2,
                });
            }
        }

        function drawConstellation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                s.x += s.vx;
                s.y += s.vy;
                s.pulse += 0.008;

                if (s.x < 0) s.x = canvas.width;
                if (s.x > canvas.width) s.x = 0;
                if (s.y < 0) s.y = canvas.height;
                if (s.y > canvas.height) s.y = 0;

                const flicker = s.alpha + Math.sin(s.pulse) * 0.15;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${flicker})`;
                ctx.fill();

                // Connect nearby stars with faint lines
                for (let j = i + 1; j < stars.length; j++) {
                    const s2 = stars[j];
                    const dx = s.x - s2.x;
                    const dy = s.y - s2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(s.x, s.y);
                        ctx.lineTo(s2.x, s2.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.03 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            animFrame = requestAnimationFrame(drawConstellation);
        }

        initCanvas();
        drawConstellation();
        window.addEventListener('resize', () => { initCanvas(); });

        // ─── Loading Text Morph ────────────────────────────────────────
        const loadingPhrases = [
            'reading you...',
            'pulling threads...',
            'looking closer...',
            'finding the pattern...',
            'almost there...',
            'the math is done. translating...',
        ];
        let phraseIndex = 0;
        let morphInterval;

        function startLoadingMorph() {
            const el = document.getElementById('loadingText');
            morphInterval = setInterval(() => {
                phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
                el.style.opacity = '0';
                setTimeout(() => {
                    el.textContent = loadingPhrases[phraseIndex];
                    el.style.opacity = '1';
                }, 400);
            }, 2800);
        }

        function stopLoadingMorph() {
            clearInterval(morphInterval);
            phraseIndex = 0;
        }

        // ─── Scroll Reveal (IntersectionObserver) ─────────────────────
        function initScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -40px 0px'
            });

            document.querySelectorAll('.reading-section').forEach(section => {
                observer.observe(section);
            });
        }

        // ─── Deep Astro-Trained Co-Star System Prompt ─────────────────────────
        const SYSTEM_INSTRUCTION = `
You are Starrygate, a Vedic astrology assistant. You analyze birth chart data and give clear, direct, plain English readings.

Rules:
1. Base every statement on the chart data provided. Do not invent placements or transits.
2. Use plain language — no jargon, no technical terms. Explain what things mean in real life.
3. For a full chart reading, use these bold section headers in order: **Today at a Glance**, **Year at a Glance**, **Identity**, **The Mask**, **The Knot**, **Emotions**, **Drive**, **Communication**, **Love**, **Pressure**, **Recommended Song**, **Recommended Movie**, **Quote**, **Fun Fact**.
4. Write 2-4 clear sentences per section.
5. For follow-up questions, just answer the question directly in a few plain paragraphs. No headers needed.
Do not output XML thinking tags. Only output the final text.
`;

        const BACKEND_URL = window.location.origin;
        let conversationHistory = [];
        let currentChartContext = '';

        window.onload = () => { 
            restoreStateFromStorage();
        };

        function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
        function saveApiKey() { }
        function resetApiKey() { }

        // ─── LocalStorage Persistence ──────────────────────────────────────
        function saveStateToStorage() {
            const state = {
                chartContext: currentChartContext,
                chatHistory: conversationHistory,
                planetaryBadgesHTML: document.getElementById('planetaryBadges').innerHTML,
                voidCardsHTML: document.getElementById('voidCards').innerHTML,
                readingContentHTML: document.getElementById('readingContent').innerHTML,
                chatBoxHTML: document.getElementById('floatingChatMessages').innerHTML
            };
            localStorage.setItem('starrygate_state', JSON.stringify(state));
        }

        function restoreStateFromStorage() {
            const stateStr = localStorage.getItem('starrygate_state');
            if (!stateStr) return;

            try {
                const state = JSON.parse(stateStr);
                
                // Restore variables
                currentChartContext = state.chartContext || '';
                conversationHistory = state.chatHistory || [];

                // Restore HTML content
                document.getElementById('planetaryBadges').innerHTML = state.planetaryBadgesHTML || '';
                document.getElementById('voidCards').innerHTML = state.voidCardsHTML || '';
                document.getElementById('readingContent').innerHTML = state.readingContentHTML || '';
                document.getElementById('floatingChatMessages').innerHTML = state.chatBoxHTML || '';

                // Restore UI Visibility
                document.getElementById('welcomeSection').classList.add('hidden');
                document.getElementById('readingArea').style.display = 'flex';
                document.getElementById('planetaryBadges').classList.remove('hidden');
                
                // Only show void cards if they have content
                if (state.voidCardsHTML && state.voidCardsHTML.indexOf('—') === -1) {
                    document.getElementById('voidCards').classList.remove('hidden');
                }

                document.getElementById('floatingAskBar').classList.add('active');
                document.getElementById('startOverBtn').classList.remove('hidden');

                // Scroll chat to bottom
                const chat = document.getElementById('floatingChatMessages');
                chat.scrollTop = chat.scrollHeight;

                // Re-init reveal animations
                setTimeout(initScrollReveal, 100);

            } catch (e) {
                console.error("Failed to restore state", e);
                clearStorageAndReload();
            }
        }

        function clearStorageAndReload() {
            localStorage.removeItem('starrygate_state');
            window.location.reload();
        }

        async function generateFullReading() {
            let dobRaw = document.getElementById('dobInput').value.trim();
            const tobRaw = document.getElementById('tobInput').value;
            const place = document.getElementById('placeInput').value.trim();
            const lat = document.getElementById('cityLat').value;
            const lon = document.getElementById('cityLon').value;
            const errorEl = document.getElementById('formError');

            if (!dobRaw || !tobRaw || !place) { errorEl.textContent = 'missing data.'; return; }

            // Parse DD/MM/YYYY to YYYY-MM-DD for backend
            let dob = dobRaw;
            if (dobRaw.includes('/')) {
                const parts = dobRaw.split('/');
                if (parts.length === 3) {
                    dob = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                }
            }

            errorEl.textContent = '';
            const tob = tobRaw.length === 5 ? tobRaw + ':00' : tobRaw;

            document.getElementById('loadingOverlay').classList.remove('hidden');
            startLoadingMorph();

            try {
                // Prepare request body
                const reqBody = { dob, tob, place, name: 'User' };
                if (lat && lon) {
                    reqBody.lat = parseFloat(lat);
                    reqBody.lon = parseFloat(lon);
                }

                // 1. Calculate Chart Math
                const res = await fetch(`${BACKEND_URL}/api/chart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true'
                    },
                    body: JSON.stringify(reqBody)
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                currentChartContext = data.chart_context || '';

                // Populate Planetary Badges
                if (data.ascendant) {
                    const ascSign = data.ascendant.split(' ')[0]; // "Aries (20°45')" -> "Aries"
                    document.getElementById('badgeAsc').textContent = ascSign;
                    document.getElementById('badgeSun').textContent = data.sun_sign;
                    document.getElementById('badgeMoon').textContent = data.moon_sign;
                    document.getElementById('planetaryBadges').classList.remove('hidden');
                }

                // Cinematic transition
                const welcomeEl = document.getElementById('welcomeSection');
                welcomeEl.style.opacity = '0';
                welcomeEl.style.transition = 'opacity 0.6s ease';

                setTimeout(() => {
                    welcomeEl.classList.add('hidden');
                    document.getElementById('readingArea').style.display = 'flex';
                    document.getElementById('startOverBtn').classList.remove('hidden');
                }, 600);

                // 2. Automatically ask backend for the full Co-Star reading
                const prompt = "Generate my full chart reading exactly in the requested format. Follow the system instructions precisely.";
                conversationHistory = [];
                const readingText = await callBackend(prompt);

                // Parse and render the reading
                renderReading(readingText);

                // Init scroll reveals after content is rendered
                setTimeout(initScrollReveal, 100);

                // Show floating ask bar
                document.getElementById('floatingAskBar').classList.add('active');

                // Save initial state to localStorage
                saveStateToStorage();

            } catch (err) {
                errorEl.textContent = err.message;
            } finally {
                stopLoadingMorph();
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function renderReading(rawText) {
            if (!rawText || !rawText.trim()) {
                document.getElementById('readingContent').innerHTML =
                    '<p class="error-text">No reading received. Please try again.</p>';
                return;
            }
            // Render the plain-text/markdown response directly
            document.getElementById('readingContent').innerHTML = marked.parse(rawText);
        }

        async function handleFloatingSend() {
            const input = document.getElementById('floatingInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';

            const chat = document.getElementById('floatingChatMessages');
            chat.innerHTML += `<div class="msg-user">${text}</div>`;
            chat.innerHTML += `<div class="msg-assistant typing" id="floatingTyping" style="color:var(--text-muted);font-style:italic;">...</div>`;
            chat.scrollTop = chat.scrollHeight;

            conversationHistory.push({ role: 'user', content: text });

            try {
                const response = await callBackend(text);
                const typingEl = document.getElementById('floatingTyping');
                if (typingEl) typingEl.remove();

                let cleaned = response.replace(/<think>[\s\S]*?<\/think>/gi, '').replace(/<thought>[\s\S]*?<\/thought>/gi, '').replace(/\*\*/g, '').trim();
                chat.innerHTML += `<div class="msg-assistant">${marked.parse(cleaned)}</div>`;
                conversationHistory.push({ role: 'assistant', content: response });
                chat.scrollTop = chat.scrollHeight;

                // Update localStorage with new chat history
                saveStateToStorage();
            } catch (err) {
                const typingEl = document.getElementById('floatingTyping');
                if (typingEl) typingEl.remove();
                chat.innerHTML += `<div class="msg-assistant" style="color:#555">error: ${err.message}</div>`;
            }
        }

        async function callBackend(query) {
            const messages = [
                { role: 'system', content: SYSTEM_INSTRUCTION },
                ...conversationHistory
            ];
            if (conversationHistory.length === 0) {
                messages.push({ role: 'user', content: query });
            }

            const res = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Bypass-Tunnel-Reminder': 'true'
                },
                body: JSON.stringify({
                    messages, api_key: getApiKey(), chart_context: currentChartContext,
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices?.[0]?.message?.content || '';
        }

        document.getElementById('floatingInput').addEventListener('input', function () {
            this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });

        // ─── DD/MM/YYYY Date Mask ───────────────────────────────────────────
        const dobInput = document.getElementById('dobInput');
        dobInput.addEventListener('input', function (e) {
            let val = this.value.replace(/\D/g, '');
            if (val.length >= 3 && val.length <= 4) {
                val = val.substring(0, 2) + '/' + val.substring(2);
            } else if (val.length >= 5) {
                val = val.substring(0, 2) + '/' + val.substring(2, 4) + '/' + val.substring(4, 8);
            }
            this.value = val;
        });

        // ─── City Autocomplete Logic ─────────────────────────────────────────
        const placeInput = document.getElementById('placeInput');
        const cityDropdown = document.getElementById('cityDropdown');
        const cityLat = document.getElementById('cityLat');
        const cityLon = document.getElementById('cityLon');
        let cityDebounceTimer;

        placeInput.addEventListener('input', function () {
            clearTimeout(cityDebounceTimer);
            const query = this.value.trim();

            // Re-typing invalidates the specific coordinates until selected again
            cityLat.value = '';
            cityLon.value = '';

            if (query.length < 3) {
                cityDropdown.innerHTML = '';
                cityDropdown.classList.add('hidden');
                return;
            }

            cityDebounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&featuretype=city,town,village&limit=5&email=contact@starrygate.in`);
                    const data = await res.json();

                    if (data.length === 0) {
                        cityDropdown.innerHTML = '<div class="city-option" style="cursor:default;">no results.</div>';
                        cityDropdown.classList.remove('hidden');
                        return;
                    }

                    cityDropdown.innerHTML = '';
                    data.forEach(item => {
                        // Simplify display name (e.g., "Paris, Ile-de-France, France" -> "Paris, France")
                        const parts = item.display_name.split(', ');
                        const shortName = parts.length > 2 ? `${parts[0]}, ${parts[parts.length - 1]}` : item.display_name;

                        const div = document.createElement('div');
                        div.className = 'city-option';
                        div.textContent = shortName;
                        div.onclick = () => {
                            placeInput.value = shortName;
                            cityLat.value = item.lat;
                            cityLon.value = item.lon;
                            cityDropdown.classList.add('hidden');
                        };
                        cityDropdown.appendChild(div);
                    });
                    cityDropdown.classList.remove('hidden');

                } catch (err) {
                    console.error('Geocoding error:', err);
                }
            }, 400); // 400ms debounce
        });

        // Hide dropdown on clicking outside
        document.addEventListener('click', (e) => {
            if (!placeInput.contains(e.target) && !cityDropdown.contains(e.target)) {
                cityDropdown.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
