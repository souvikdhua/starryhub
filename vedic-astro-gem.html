<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starrygate</title>
    <meta name="description" content="Starrygate — astrology that doesn't lie to you.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #000000;
            --bg-elevated: #0a0a0a;
            --text: #f0f0f0;
            --text-secondary: #888888;
            --text-muted: #444444;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --sans: 'Inter', -apple-system, sans-serif;
            --serif: 'Cormorant Garamond', Georgia, serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            text-transform: lowercase;
            overflow-x: hidden;
        }

        /* ─── Constellation Canvas ─── */
        #constellationCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }

        /* ─── Ambient Floating Orbs ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: orbFloat 20s infinite ease-in-out, orbFadeIn 3s forwards;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            top: 50%;
            right: -15%;
            animation-delay: 7s;
            animation-duration: 25s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.025) 0%, transparent 70%);
            bottom: -5%;
            left: 30%;
            animation-delay: 14s;
            animation-duration: 30s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -40px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(15px, 30px) scale(1.02);
            }
        }

        @keyframes orbFadeIn {
            to {
                opacity: 1;
            }
        }

        /* ─── Grain Overlay ─── */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ─── Vignette Overlay ─── */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 40px;
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            font-family: var(--sans);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 8px;
            color: var(--text);
            text-transform: uppercase;
        }

        /* ─── Main Container ─── */
        .main-container {
            flex: 1;
            padding: 140px 24px 80px;
            max-width: 620px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* ─── Welcome Section ─── */
        .welcome-section {
            padding: 60px 0 40px;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        .welcome-poem {
            font-family: var(--serif);
            font-size: 2.8rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: none;
            opacity: 0;
            animation: textReveal 1.5s ease forwards 0.3s;
        }

        .welcome-poem-sub {
            font-family: var(--serif);
            font-size: 1.6rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 80px;
            text-transform: none;
            opacity: 0;
            animation: textReveal 1.5s ease forwards 0.8s;
        }

        @keyframes textReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* ─── Birth Form ─── */
        .birth-form {
            text-align: left;
            margin-top: 20px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            animation: textReveal 1s ease forwards 1.2s;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
        }

        .form-group label {
            display: block;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }

        .form-group:focus-within label {
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.1rem;
            font-family: var(--serif);
            font-weight: 300;
            outline: none;
            padding: 8px 0 12px;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .form-group input[type="date"],
        .form-group input[type="time"] {
            color-scheme: dark;
        }

        .chart-btn {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: var(--sans);
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
        }

        .chart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .chart-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
        }

        .chart-btn:hover::before {
            left: 100%;
        }

        .chart-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* ─── City Dropdown ─── */
        .city-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 50;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        .city-dropdown.hidden {
            display: none;
        }

        .city-dropdown::-webkit-scrollbar {
            width: 4px;
        }

        .city-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .city-option {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--sans);
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .city-option:last-child {
            border-bottom: none;
        }

        .city-option:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .form-error {
            color: #666;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
            font-family: var(--sans);
            letter-spacing: 1px;
        }

        /* ─── Reading Area ─── */
        .reading-area {
            display: none;
            flex-direction: column;
            gap: 0;
            padding-top: 20px;
        }

        .reading-header {
            font-family: var(--serif);
            font-size: 3rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            text-align: center;
            margin-bottom: 40px;
            text-transform: none;
            padding-bottom: 60px;
            position: relative;
            opacity: 0;
            animation: textReveal 1.5s ease forwards 0.2s;
        }

        .reading-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: var(--text-muted);
        }

        .reading-content {
            font-size: 1.08rem;
            line-height: 2.1;
            color: var(--text);
            font-family: var(--sans);
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        .reading-visual-divider {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 60px;
            letter-spacing: 12px;
        }

        .reading-section {
            margin-bottom: 0;
            padding: 50px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reading-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reading-content p {
            margin-bottom: 20px;
            font-weight: 300;
        }

        .reading-content strong {
            display: block;
            font-family: var(--sans);
            font-weight: 200;
            font-size: 1.8rem;
            letter-spacing: 6px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            color: var(--text);
            text-transform: lowercase;
            position: relative;
        }

        .reading-content strong::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 24px;
            height: 1px;
            background: var(--text-muted);
            transition: width 0.6s ease;
        }

        .reading-section.visible strong::after {
            width: 60px;
        }

        .reading-content ul {
            list-style: none;
            margin-bottom: 30px;
        }

        .reading-content li {
            position: relative;
            padding-left: 24px;
            margin-bottom: 20px;
            color: #c8c8c8;
            font-weight: 300;
            line-height: 1.9;
            font-size: 1.05rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.5s ease;
        }

        .reading-section.visible li {
            opacity: 1;
            transform: translateX(0);
        }

        .reading-section.visible li:nth-child(1) {
            transition-delay: 0.1s;
        }

        .reading-section.visible li:nth-child(2) {
            transition-delay: 0.2s;
        }

        .reading-section.visible li:nth-child(3) {
            transition-delay: 0.3s;
        }

        .reading-section.visible li:nth-child(4) {
            transition-delay: 0.4s;
        }

        .reading-section.visible li:nth-child(5) {
            transition-delay: 0.5s;
        }

        .reading-content li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 10px;
            height: 1px;
            background: #555;
        }

        /* ─── Do/Don't Glass Panels ─── */
        .dos-donts {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .do-block,
        .dont-block {
            flex: 1;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .do-block:hover,
        .dont-block:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .do-label {
            color: var(--text);
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 3px;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .dont-label {
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 3px;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .do-text {
            color: #b0b0b0;
            line-height: 1.7;
            font-weight: 300;
            font-size: 0.95rem;
        }

        /* ─── Chat Follow-up ─── */
        .chat-area {
            display: none;
            margin-top: 80px;
            padding-top: 60px;
            position: relative;
        }

        .chat-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: var(--text-muted);
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin-bottom: 60px;
        }

        .msg-user {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            font-family: var(--serif);
            margin-bottom: 8px;
            text-align: right;
            opacity: 0;
            animation: msgSlideIn 0.5s ease forwards;
        }

        @keyframes msgSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-assistant {
            color: var(--text);
            font-size: 1rem;
            line-height: 2;
            font-weight: 300;
            opacity: 0;
            animation: msgSlideIn 0.8s ease forwards 0.15s;
        }

        .msg-assistant p {
            margin-bottom: 12px;
        }

        /* ─── Input Area (Floating Glass) ─── */
        .input-wrap {
            position: relative;
            margin-top: 40px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s ease;
        }

        .input-wrap:focus-within {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.02);
        }

        .input-wrap textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            font-family: var(--sans);
            font-weight: 300;
            resize: none;
            outline: none;
            display: block;
            letter-spacing: 0.3px;
        }

        .input-wrap textarea::placeholder {
            color: #333;
            letter-spacing: 1px;
        }

        /* ─── Loading Overlay — Morphing Text ─── */
        .loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .loading-text {
            font-family: var(--serif);
            font-size: 1.6rem;
            font-style: italic;
            font-weight: 300;
            color: var(--text-secondary);
            animation: pulse 2.5s infinite ease-in-out;
            text-transform: none;
            letter-spacing: 1px;
            transition: opacity 0.4s ease;
        }

        .loading-progress {
            width: 40px;
            height: 1px;
            background: var(--text-muted);
            margin-top: 40px;
            position: relative;
            overflow: hidden;
        }

        .loading-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text-secondary);
            animation: progressSlide 2s infinite ease-in-out;
        }

        @keyframes progressSlide {
            0% {
                left: -100%;
            }

            50% {
                left: 100%;
            }

            100% {
                left: 100%;
            }
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.15;
            }

            50% {
                opacity: 0.8;
            }
        }

        /* Staggered animation classes */
        .stagger-1 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 0.2s;
        }

        .stagger-2 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 0.6s;
        }

        .stagger-3 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 1.0s;
        }

        .stagger-4 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 1.4s;
        }

        .stagger-5 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 1.8s;
        }

        .stagger-6 {
            animation: fadeIn 0.8s ease backwards;
            animation-delay: 2.2s;
        }

        /* ─── API Key Modal (Mono Popup) ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .modal {
            width: 100%;
            max-width: 380px;
            padding: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            animation: modalIn 0.5s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h3 {
            font-family: var(--sans);
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 6px;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .modal input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 14px 0;
            font-family: var(--sans);
            font-weight: 300;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 36px;
            transition: border-color 0.3s ease;
        }

        .modal input:focus {
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        .modal button {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px;
            font-family: var(--sans);
            font-weight: 500;
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .modal button:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
        }

        /* ─── Cinematic Transition ─── */
        .cinematic-fade {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 40;
            opacity: 1;
            animation: cinematicOut 1.2s ease forwards;
            pointer-events: none;
        }

        @keyframes cinematicOut {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 2px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
        }

        /* ─── Void Cards (Song / Movie / Quote) ─── */
        .void-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 60px;
            opacity: 0;
            animation: textReveal 1.2s ease forwards 0.5s;
        }

        .void-card {
            padding: 28px 24px;

        const ctx = canvas.getContext('2d');

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            const count = Math.floor((canvas.width * canvas.height) / 12000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.2 + 0.2,
                    vx: (Math.random() - 0.5) * 0.15,
                    vy: (Math.random() - 0.5) * 0.15,
                    alpha: Math.random() * 0.6 + 0.1,
                    pulse: Math.random() * Math.PI * 2,
                });
            }
        }

        function drawConstellation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                s.x += s.vx;
                s.y += s.vy;
                s.pulse += 0.008;

                if (s.x < 0) s.x = canvas.width;
                if (s.x > canvas.width) s.x = 0;
                if (s.y < 0) s.y = canvas.height;
                if (s.y > canvas.height) s.y = 0;

                const flicker = s.alpha + Math.sin(s.pulse) * 0.15;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${flicker})`;
                ctx.fill();

                // Connect nearby stars with faint lines
                for (let j = i + 1; j < stars.length; j++) {
                    const s2 = stars[j];
                    const dx = s.x - s2.x;
                    const dy = s.y - s2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(s.x, s.y);
                        ctx.lineTo(s2.x, s2.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.03 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            animFrame = requestAnimationFrame(drawConstellation);

                .trim();

            // ─── Extract soul song, movie, quote for void cards ───
            // Pre-process content to catch headers merged onto the same line as previous text
            let content = cleaned;
            const knownHeaders = [
                'today at a glance', 'year at a glance', 'identity',
                'the mirror', 'the mask', 'the knot', 'emotions', 'drive',
                'communication', 'love', 'pressure', 'strength', 'weakness',
                'soul song', 'soul movie', 'quote', 'fun fact'
            ];
            knownHeaders.forEach(h => {
                // If a header appears immediately after a period/exclamation/question mark, split it
                const regex = new RegExp(`(?<=[\\.\\?!]\\s+)(${h})`, 'gi');
                content = content.replace(regex, '\n$1');
            });

            const lines = content.split('\n');
            let soulSong = '';
            let soulMovie = '';
            let soulQuote = '';
            const skipSections = new Set();

            // Helper: extract content bullet from section start index
            function extractBullet(startIdx) {
                // First check if the content is right after the colon on the same line
                const line = lines[startIdx];
                if (line.includes(':')) {
                    const parts = line.split(':');
                    if (parts.length > 1 && parts[1].trim().length > 0) {
                        return parts[1].trim().replace(/^[-–—•]/, '').trim();
                    }
                }

                // Otherwise look at the next few lines
                for (let j = startIdx + 1; j < Math.min(startIdx + 5, lines.length); j++) {
                    const next = lines[j].trim();
                    if (!next) continue;
                    skipSections.add(j);
                    // Return the first non-empty line we find, stripping bullet chars if present
                    return next.replace(/^[-–—•]/, '').replace(/\*/g, '').trim();
                }
                return '—';
            }

            // Find and extract the special sections (resilient matching)
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim().toLowerCase().replace(/[:\-]/g, '').trim();
                // Match the void card titles and explicitly hide them entirely.
                if (line.startsWith('soul song') || line === 'soul song') {
                    skipSections.add(i);
                    soulSong = extractBullet(i);
                } else if (line.startsWith('soul movie') || line === 'soul movie' || line === 'your film') {
                    skipSections.add(i);
                    soulMovie = extractBullet(i);
                } else if (line === 'quote' || line.startsWith('quote for') || line === 'a quote for you' || line === 'for you') {
                    skipSections.add(i);
                    soulQuote = extractBullet(i);
                } else if (line.startsWith('fun fact') || line === 'fun fact') {
                    // Also skip fun fact from main reading — it's a bonus detail
                    skipSections.add(i);
                    for (let j = i + 1; j < lines.length; j++) {
                        const next = lines[j].trim();
                        if (!next) continue;
                        if (next.startsWith('-') || next.startsWith('–') || next.startsWith('—') || next.startsWith('•')) {
                            skipSections.add(j);
                        }
                        break;
                    }
                }
            }

            // Populate void cards
            if (soulSong || soulMovie || soulQuote) {
                document.getElementById('voidCards').classList.remove('hidden');
                if (soulSong) document.getElementById('voidSongContent').textContent = soulSong;
                if (soulMovie) document.getElementById('voidMovieContent').textContent = soulMovie;
                if (soulQuote) document.getElementById('voidQuoteContent').textContent = soulQuote;
            }

            // ─── Build main reading HTML (excluding extracted sections) ───
            // PASS 1: Split content into sections by known headers
            const sections = [];
            let currentSection = null;

            for (let i = 0; i < lines.length; i++) {
                if (skipSections.has(i)) continue;
                let line = lines[i].trim();
                if (!line) continue;

                let lowerLine = line.toLowerCase();
                const cleanContext = lowerLine.replace(/[\*:_~\[\]#\-]/g, '').trim();

                // Check if this line is a known header
                let isHeader = false;
                for (const h of knownHeaders) {
                    if (cleanContext === h || cleanContext.startsWith(h + ' ') || cleanContext.startsWith(h + ':')) {
                        isHeader = true; break;
                    }
                }

                if (isHeader) {
                    currentSection = {
                        title: line.replace(/[\*:_~\[\]#]/g, '').trim(),
                        items: []
                    };
                    sections.push(currentSection);
                } else if (currentSection) {
                    currentSection.items.push(line);
                } else {
                    // Content before any header — create an implicit section
                    currentSection = { title: '', items: [line] };
                    sections.push(currentSection);
                }
            }

            // PASS 2: Render each section into HTML
            let html = '<div class="reading-visual-divider">· · ·</div>';

            for (const section of sections) {
                html += `<div class="reading-section">`;
                if (section.title) {
                    html += `<strong>${section.title}</strong>`;
                }

                let doText = null;
                let i = 0;
                while (i < section.items.length) {
                    const item = section.items[i];
                    const lower = item.toLowerCase();

                    // DO line
                    if (lower.startsWith('do:') || lower === 'do') {
                        if (lower.includes(':')) {
                            doText = item.substring(item.indexOf(':') + 1).trim();
                        } else if (i + 1 < section.items.length) {
                            doText = section.items[i + 1];
                            i++;
                        }
                        i++; continue;
                    }

                    // DON'T line
                    if (lower.startsWith("don't:") || lower.startsWith("don\u2019t:") || lower === "don't" || lower === "don\u2019t") {
                        let dontText = '';
                        if (lower.includes(':')) {
                            dontText = item.substring(item.indexOf(':') + 1).trim();
                        } else if (i + 1 < section.items.length) {
                            dontText = section.items[i + 1];
                            i++;
                        }
                        html += `
                            <div class="dos-donts">
                                <div class="do-block">
                                    <span class="do-label">do</span>
                                    <span class="do-text">${(doText || '').toLowerCase()}</span>
                                </div>
                                <div class="dont-block">
                                    <span class="dont-label">don't</span>
                                    <span class="do-text">${(dontText || '').toLowerCase()}</span>
                                </div>
                            </div>`;
                        doText = null;
                        i++; continue;
                    }

                    // Bullet line
                    if (item.startsWith('-') || item.startsWith('–') || item.startsWith('—') || item.startsWith('•')) {
                        html += `<ul><li>${item.substring(1).trim()}</li></ul>`;
                    } else {
                        // Paragraph text
                        html += `<p class="reading-paragraph" style="margin-bottom:12px">${item}</p>`;
                    }
                    i++;
                }

                // Flush any trailing DO without a DON'T
                if (doText) {
                    html += `
                        <div class="dos-donts">
                            <div class="do-block">
                                <span class="do-label">do</span>
                                <span class="do-text">${doText.toLowerCase()}</span>
                            </div>
                            <div class="dont-block">
                                <span class="dont-label">don't</span>
                                <span class="do-text"></span>
                            </div>
                        </div>`;
                }
                html += `</div>`;
            }

            document.getElementById('readingContent').innerHTML = html;
        }

        async function handleFloatingSend() {
            const input = document.getElementById('floatingInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';

            const chat = document.getElementById('floatingChatMessages');
            chat.innerHTML += `<div class="msg-user">${text}</div>`;
            chat.innerHTML += `<div class="msg-assistant typing" id="floatingTyping" style="color:var(--text-muted);font-style:italic;">...</div>`;
            chat.scrollTop = chat.scrollHeight;

            conversationHistory.push({ role: 'user', content: text });

            try {
                const response = await callBackend(text);
                const typingEl = document.getElementById('floatingTyping');
                if (typingEl) typingEl.remove();

                let cleaned = response.replace(/<think>[\s\S]*?<\/think>/gi, '').replace(/<thought>[\s\S]*?<\/thought>/gi, '').replace(/\*\*/g, '').trim();
                chat.innerHTML += `<div class="msg-assistant">${marked.parse(cleaned)}</div>`;
                conversationHistory.push({ role: 'assistant', content: response });
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                const typingEl = document.getElementById('floatingTyping');
                if (typingEl) typingEl.remove();
                chat.innerHTML += `<div class="msg-assistant" style="color:#555">error: ${err.message}</div>`;
            }
        }

        async function callBackend(query) {
            const messages = [
                { role: 'system', content: SYSTEM_INSTRUCTION },
                ...conversationHistory
            ];
            if (conversationHistory.length === 0) {
                messages.push({ role: 'user', content: query });
            }

            const res = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Bypass-Tunnel-Reminder': 'true'
                },
                body: JSON.stringify({
                    messages, api_key: getApiKey(), chart_context: currentChartContext,
                }),
                signal: AbortSignal.timeout(60000),
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices?.[0]?.message?.content || '';
        }

        document.getElementById('floatingInput').addEventListener('input', function () {
            this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });

        // ─── City Autocomplete Logic ─────────────────────────────────────────
        const placeInput = document.getElementById('placeInput');
        const cityDropdown = document.getElementById('cityDropdown');
        const cityLat = document.getElementById('cityLat');
        const cityLon = document.getElementById('cityLon');
        let cityDebounceTimer;

        placeInput.addEventListener('input', function () {
            clearTimeout(cityDebounceTimer);
            const query = this.value.trim();

            // Re-typing invalidates the specific coordinates until selected again
            cityLat.value = '';
            cityLon.value = '';

            if (query.length < 3) {
                cityDropdown.innerHTML = '';
                cityDropdown.classList.add('hidden');
                return;
            }

            cityDebounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&featuretype=city,town,village&limit=5`, {
                        headers: { 'User-Agent': 'Starrygate/1.0' }
                    });
                    const data = await res.json();

                    if (data.length === 0) {
                        cityDropdown.innerHTML = '<div class="city-option" style="cursor:default;">no results.</div>';
                        cityDropdown.classList.remove('hidden');
                        return;
                    }

                    cityDropdown.innerHTML = '';
                    data.forEach(item => {
                        // Simplify display name (e.g., "Paris, Ile-de-France, France" -> "Paris, France")
                        const parts = item.display_name.split(', ');
                        const shortName = parts.length > 2 ? `${parts[0]}, ${parts[parts.length - 1]}` : item.display_name;

                        const div = document.createElement('div');
                        div.className = 'city-option';
                        div.textContent = shortName;
                        div.onclick = () => {
                            placeInput.value = shortName;
                            cityLat.value = item.lat;
                            cityLon.value = item.lon;
                            cityDropdown.classList.add('hidden');
                        };
                        cityDropdown.appendChild(div);
                    });
                    cityDropdown.classList.remove('hidden');

                } catch (err) {
                    console.error('Geocoding error:', err);
                }
            }, 400); // 400ms debounce
        });

        // Hide dropdown on clicking outside
        document.addEventListener('click', (e) => {
            if (!placeInput.contains(e.target) && !cityDropdown.contains(e.target)) {
                cityDropdown.classList.add('hidden');
            }
        });
    </script>
